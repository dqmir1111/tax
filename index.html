<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi | Client</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #5856d6; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; background: linear-gradient(180deg, #101223 0%, #05070a 100%); position: relative; display: flex; flex-direction: column; }
        .balance { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; border: 1px solid var(--accent); backdrop-filter: blur(10px); z-index: 10; font-weight: bold; }
        .map { flex-grow: 1; background: url('https://i.imgur.com/8mQWpYv.png') center/cover; filter: grayscale(0.7) brightness(0.4); }
        .panel { background: var(--glass); backdrop-filter: blur(30px); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 30px 30px 0 0; padding: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .input-box { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .tariffs { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-card { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .t-card.active { border-color: var(--accent); background: rgba(88, 86, 214, 0.2); box-shadow: 0 0 15px rgba(88, 86, 214, 0.3); }
        .btn-order { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 17px; }
        .overlay { position: absolute; inset: 0; background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(15px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .price { font-size: 72px; font-weight: 900; color: #4cd964; text-shadow: 0 0 30px rgba(76, 217, 100, 0.3); }
        .stars span { font-size: 45px; cursor: pointer; margin: 0 5px; filter: grayscale(1); transition: 0.2s; }
        .stars span:hover { filter: grayscale(0); transform: scale(1.2); }
        .loader { width: 80px; height: 80px; border: 4px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="app">
    <div class="balance"><span id="u_bal">0</span>₽</div>
    <div class="map"></div>

    <div id="view_search" class="overlay">
        <div class="loader"></div>
        <h2 style="margin-top:25px;">Ищем машину...</h2>
        <p style="color:gray">Водитель скоро примет заказ</p>
    </div>

    <div id="view_ride" class="overlay">
        <div class="price" id="u_spent">0₽</div>
        <h3 style="margin: 0;">Поездка активна</h3>
        <p style="color:gray; font-size:14px;">Тариф: <span id="u_rate">0</span>₽ / 10 сек</p>
    </div>

    <div id="view_review" class="overlay">
        <h2 style="margin-bottom:10px;">Приехали!</h2>
        <p style="color:gray">Поставьте оценку водителю</p>
        <div class="stars">
            <span onclick="rate(1)">⭐</span><span onclick="rate(2)">⭐</span><span onclick="rate(3)">⭐</span><span onclick="rate(4)">⭐</span><span onclick="rate(5)">⭐</span>
        </div>
    </div>

    <div class="panel">
        <div class="input-box"><input type="text" placeholder="Куда едем?" id="dest_input"></div>
        <div class="tariffs">
            <div class="t-card active" onclick="setTariff(10, this)">Эконом<br><small>10₽/10с</small></div>
            <div class="t-card" onclick="setTariff(25, this)">Комфорт<br><small>25₽/10с</small></div>
        </div>
        <button class="btn-order" onclick="createOrder()">ЗАКАЗАТЬ</button>
    </div>
    <div class="footer">Powered by ThisTeam</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
        authDomain: "clutchdq.firebaseapp.com",
        databaseURL: "https://clutchdq-default-rtdb.firebaseio.com",
        projectId: "clutchdq",
        storageBucket: "clutchdq.firebasestorage.app",
        messagingSenderId: "329422689964",
        appId: "1:329422689964:web:3c388e906d2d46e84bb109"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Генерируем ID или берем старый
    let myId = localStorage.getItem('taxi_uid') || "user_" + Math.floor(Math.random()*9000);
    localStorage.setItem('taxi_uid', myId);

    let curBal = 0;
    let curRate = 10;

    // Реалтайм слушатель
    db.ref('users/' + myId).on('value', (s) => {
        const u = s.val();
        if(!u) { db.ref('users/' + myId).set({ balance: 100, status: 'idle' }); return; }
        
        curBal = u.balance || 0;
        document.getElementById('u_bal').innerText = curBal;
        document.getElementById('u_spent').innerText = (u.spent || 0) + "₽";
        document.getElementById('u_rate').innerText = u.rate || 10;

        document.getElementById('view_search').style.display = (u.status === 'searching') ? 'flex' : 'none';
        document.getElementById('view_ride').style.display = (u.status === 'active') ? 'flex' : 'none';
        document.getElementById('view_review').style.display = (u.status === 'finished') ? 'flex' : 'none';
    });

    function setTariff(r, el) {
        curRate = r;
        document.querySelectorAll('.t-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function createOrder() {
        const dest = document.getElementById('dest_input').value;
        if(!dest) return alert("Введите адрес!");
        if(curBal < curRate) return alert("Пополните баланс! Минимум: " + curRate + "₽");

        db.ref('users/' + myId).update({
            status: 'searching',
            destination: dest,
            rate: curRate,
            spent: 0,
            last_order_time: Date.now()
        });
    }

    function rate(s) {
        fetch(`https://api.telegram.org/bot8694208406:AAGD6X0ScW9xNFMdaOWi6xWv7yu4qmQCYqg/sendMessage?chat_id=7567154840&text=${encodeURIComponent("🌟 Отзыв: " + "⭐".repeat(s))}`);
        db.ref('users/' + myId).update({ status: 'idle' });
    }
</script>
</body>
</html>
