<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Client | Powered by ThisTeam</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0b0e16;
            --glass: rgba(255, 255, 255, 0.07);
            --accent: #5856d6;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, #1c1c2e 0%, #0b0e16 100%);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .map-bg {
            flex-grow: 1;
            background: url('https://i.imgur.com/8mQWpYv.png') center/cover;
            position: relative;
            filter: grayscale(0.4) brightness(0.6);
        }

        .user-marker {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            background: var(--accent);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
        }

        .balance-badge {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            border: 1px solid var(--accent);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .profile-btn {
            position: absolute;
            top: 20px; left: 20px;
            background: var(--glass);
            padding: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            z-index: 10;
        }

        .order-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px 30px 0 0;
            padding: 25px;
        }

        .input-group {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 5px 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-size: 16px;
            outline: none;
        }

        .tariffs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tariff-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
        }
        .tariff-card.active {
            border-color: var(--accent);
            background: rgba(88, 86, 214, 0.2);
        }

        .btn-main {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Оверлеи */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 14, 22, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .radar {
            width: 120px; height: 120px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.4; } 100% { transform: scale(1.2); opacity: 0; } }

        .stars span { font-size: 40px; cursor: pointer; margin: 0 5px; transition: 0.2s; }
        .stars span:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="balance-badge"><span id="balance">0</span>₽</div>
    <div class="profile-btn" onclick="showDriverInfo()">👤</div>
    
    <div class="map-bg"><div class="user-marker"></div></div>

    <div id="searchOverlay" class="overlay">
        <div class="radar"></div>
        <h2>Поиск водителя...</h2>
        <p style="color:var(--text-dim)">Ваш заказ отправлен водителю</p>
    </div>

    <div id="rideOverlay" class="overlay">
        <h1 style="font-size: 48px; color: #4cd964; margin: 10px 0;" id="spentDisplay">0₽</h1>
        <p>Поездка активна</p>
        <p style="color:var(--text-dim)">Списание каждые 10 секунд</p>
    </div>

    <div id="reviewOverlay" class="overlay">
        <h2>Поездка завершена!</h2>
        <p>Пожалуйста, оцените водителя:</p>
        <div class="stars">
            <span onclick="sendReview(1)">⭐</span>
            <span onclick="sendReview(2)">⭐</span>
            <span onclick="sendReview(3)">⭐</span>
            <span onclick="sendReview(4)">⭐</span>
            <span onclick="sendReview(5)">⭐</span>
        </div>
    </div>

    <div class="order-panel" id="mainPanel">
        <div class="input-group"><input type="text" placeholder="Куда едем?" id="dest"></div>
        <div class="tariffs">
            <div class="tariff-card active" onclick="setRate(10, this)">Эконом<br><small>10₽/10с</small></div>
            <div class="tariff-card" onclick="setRate(25, this)">Комфорт<br><small>25₽/10с</small></div>
        </div>
        <button class="btn-main" onclick="requestTaxi()">Заказать такси</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
        authDomain: "clutchdq.firebaseapp.com",
        databaseURL: "https://clutchdq-default-rtdb.firebaseio.com",
        projectId: "clutchdq",
        storageBucket: "clutchdq.firebasestorage.app",
        messagingSenderId: "329422689964",
        appId: "1:329422689964:web:3c388e906d2d46e84bb109"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = "user_1"; // В будущем можно заменить на динамический
    let currentRate = 10;
    let rideInterval = null;

    db.ref('users/' + userId).on('value', (snap) => {
        const user = snap.val();
        if(!user) return;
        document.getElementById('balance').innerText = user.balance || 0;
        
        // Логика состояний
        document.getElementById('searchOverlay').style.display = (user.status === 'searching') ? 'flex' : 'none';
        document.getElementById('rideOverlay').style.display = (user.status === 'active') ? 'flex' : 'none';
        document.getElementById('reviewOverlay').style.display = (user.status === 'finished') ? 'flex' : 'none';
        
        if(user.status === 'active') startBilling(); else stopBilling();
    });

    function setRate(r, el) {
        currentRate = r;
        document.querySelectorAll('.tariff-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function requestTaxi() {
        const d = document.getElementById('dest').value;
        if(!d) return alert("Введите адрес!");
        db.ref('users/' + userId).update({ status: 'searching', destination: d, rate: currentRate, requestedAmount: currentRate });
    }

    function startBilling() {
        if(rideInterval) return;
        rideInterval = setInterval(() => {
            db.ref('users/' + userId).transaction(u => {
                if(u && u.balance >= u.rate) { u.balance -= u.rate; return u; }
                else { if(u) u.status = 'idle'; return u; }
            });
        }, 10000);
    }

    function stopBilling() { clearInterval(rideInterval); rideInterval = null; }

    function sendReview(stars) {
        db.ref('driver_reviews').push({ stars, userId, time: Date.now() });
        db.ref('users/' + userId).update({ status: 'idle' });
        // Уведомление водителю
        fetch(`https://api.telegram.org/bot8694208406:AAGD6X0ScW9xNFMdaOWi6xWv7yu4qmQCYqg/sendMessage?chat_id=7567154840&text=${encodeURIComponent("🌟 Новый отзыв: " + "⭐".repeat(stars))}`);
    }

    function showDriverInfo() {
        db.ref('driver_reviews').once('value', (s) => {
            const reviews = s.val();
            let sum = 0, count = 0;
            for(let r in reviews) { sum += reviews[r].stars; count++; }
            const rating = count > 0 ? (sum/count).toFixed(1) : "5.0";
            alert(`Водитель: Дамир\nРейтинг: ⭐ ${rating}\nПоездок: ${count}`);
        });
    }
</script>
</body>
</html>
